<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Battery Monitor Data</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css')}}">
    <script type="text/javascript" src="{{ url_for('static', filename='js/main.js')}}"></script>
</head>
<body>

<div id="gotoindex">
    <form action="{{ url_for('index') }}" method="POST">
        <button type="submit" name="batmonitor" id="batmonitorbutton" value="301">Back to INDEX</button>
    </form>
</div>





<div id="batmonitor">
<table>
  <tr>
    <th>Dato</th>
    <th>Tid</th>
    <th>Dev</th>
    <th>VoltDiv</th>
    <th>VoltBat</th>
    <th>Perc</th>
    <th>Avalue</th>
  </tr>
{% for item in all_databat %}
  <tr>
    <td>{{ item[0] | datetimeformat("%d") }}</td>
    <td>{{ item[0] | datetimeformat("%H:%M:%S") }}</td>
    <td>{{ item[1] }}</td>
    <td class="temperaturedata">{{ "%.0f"|format(item[2]) }}</td>
    <td class="temperaturedata">{{ "%.1f"|format(item[3]) }}</td>
    <td class="temperaturedata">{{ "%.0f"|format(item[4]) }}</td>
    <td>{{ item[5] }}</td>
  </tr>
{% endfor %}
</table>
</div>





</body>
</html>
